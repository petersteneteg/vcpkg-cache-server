name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-latest
            preset: ninja-developer
          - name: Windows (MSVC)
            os: windows-latest
            preset: msvc-developer
          - name: macOS (Xcode)
            os: macos-latest
            preset: xcode-developer-arm64

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/../vcpkg

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        run: ${{ github.workspace }}/../vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: ${{ github.workspace }}\..\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/../builds/vcpkg-cache-server-${{ matrix.preset }} --parallel
