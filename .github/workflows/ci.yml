name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  VCPKG_BINARY_SOURCES: "default;http,https://scivis-vcpkg-cache.it.liu.se/cache/{sha},readwrite,Authorization: Bearer ${{ secrets.VCPKG_CACHE_TOKEN }}"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-latest
            preset: ninja-developer
          - name: macOS (Xcode)
            os: macos-latest
            preset: xcode-developer-arm64

    steps:
      - name: Install GCC 15
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          echo "CC=gcc-15" >> $GITHUB_ENV
          echo "CXX=g++-15" >> $GITHUB_ENV

      - name: "Clone Vcpkg Cache Server"
        uses: actions/checkout@v6
        with:
          path: vcpkg-cache-server
          
      - name: "Get Vcpkg SHA"
        shell: bash
        run: |
          SHA=`jq -r '.["vcpkg-configuration"].["default-registry"].baseline' vcpkg-cache-server/vcpkg.json`
          echo "VCPKG_SHA=${SHA}" >> $GITHUB_ENV

      - name: "Clone Vcpkg"
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_SHA }}
          fetch-depth: 0
          path: vcpkg

      - name: "VCPKG Update"
        shell: bash
        run: |
          cd vcpkg
          ./bootstrap-vcpkg.sh
          echo "VCPKG_INSTALLATION_ROOT=`pwd`" >> $GITHUB_ENV
          echo "VCPKG_ROOT=`pwd`" >> $GITHUB_ENV
    
      - name: Configure
        run: cmake -S vcpkg-cache-server --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build builds/vcpkg-cache-server-${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --test-dir builds/vcpkg-cache-server-${{ matrix.preset }} --output-on-failure

      - name: Package
        working-directory: builds/vcpkg-cache-server-${{ matrix.preset }}
        run: cpack -C RelWithDebInfo

      - name: Upload Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.preset }}
          path: builds/vcpkg-cache-server-${{ matrix.preset }}/vcpkg-cache-server-*.tar.gz

  release:
    name: Create Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -lR artifacts

      - name: Create Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from the latest commit on `main`.
            Commit: ${{ github.sha }}
          prerelease: true
          # Don't mark as GitHub's "Latest Release" — that should be reserved for versioned releases
          make_latest: false
          files: artifacts/*

      - name: Create Version Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
