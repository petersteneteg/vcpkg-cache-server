name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: "default;http,https://scivis-vcpkg-cache.it.liu.se/cache/{sha},readwrite,Authorization: Bearer ${{ secrets.VCPKG_CACHE_TOKEN }}"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-latest
            preset: ninja-developer
            artifact: vcpkg-cache-server-linux-x64
          - name: macOS (Xcode)
            os: macos-latest
            preset: xcode-developer-arm64
            artifact: vcpkg-cache-server-macos-arm64

    steps:
      - name: Install GCC 15
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15
          echo "CC=gcc-15" >> $GITHUB_ENV
          echo "CXX=g++-15" >> $GITHUB_ENV

      - name: "Clone Vcpkg Cache Server"
        uses: actions/checkout@v6
        with:
          path: vcpkg-cache-server

      - name: "Get Vcpkg SHA"
        shell: bash
        run: |
          SHA=`jq -r '.["vcpkg-configuration"].["default-registry"].baseline' vcpkg-cache-server/vcpkg.json`
          echo "VCPKG_SHA=${SHA}" >> $GITHUB_ENV

      - name: "Clone Vcpkg"
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_SHA }}
          fetch-depth: 0
          path: vcpkg

      - name: "VCPKG Update"
        shell: bash
        run: |
          cd vcpkg
          ./bootstrap-vcpkg.sh
          echo "VCPKG_INSTALLATION_ROOT=`pwd`" >> $GITHUB_ENV
          echo "VCPKG_ROOT=`pwd`" >> $GITHUB_ENV

      - name: Configure
        run: cmake -S vcpkg-cache-server --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build builds/vcpkg-cache-server-${{ matrix.preset }} --parallel --config RelWithDebInfo

      - name: Test
        run: ctest --test-dir builds/vcpkg-cache-server-${{ matrix.preset }} --output-on-failure -C RelWithDebInfo

      - name: Package
        shell: bash
        run: |
          build_dir="builds/vcpkg-cache-server-${{ matrix.preset }}"
          mkdir -p staging
          # Ninja (single-config) outputs directly; Xcode (multi-config) uses a config subdirectory
          if [ -f "${build_dir}/vcpkg-cache-server" ]; then
            cp "${build_dir}/vcpkg-cache-server" staging/
          elif [ -f "${build_dir}/RelWithDebInfo/vcpkg-cache-server" ]; then
            cp "${build_dir}/RelWithDebInfo/vcpkg-cache-server" staging/
          else
            echo "::error::Could not find vcpkg-cache-server binary in ${build_dir}"
            exit 1
          fi
          cd staging
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -lR artifacts

      - name: Create Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from the latest commit on `main`.
            Commit: ${{ github.sha }}
          prerelease: true
          # Don't mark as GitHub's "Latest Release" — that should be reserved for versioned releases
          make_latest: false
          files: artifacts/*

      - name: Create Version Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
